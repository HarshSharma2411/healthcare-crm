{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — HealthCare CRM</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-icon">&#9877;</span>
      <h1>HealthCare CRM</h1>
      <p>Sign in to your account</p>
    </div>
    <form method="post" novalidate>
      {% csrf_token %}
      {% if form.errors %}
      <div class="message message-error">Invalid username or password.</div>
      {% endif %}
      <div class="form-group">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" class="form-input" autofocus required />
      </div>
      <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" class="form-input" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>
  </div>
</body>
</html>
