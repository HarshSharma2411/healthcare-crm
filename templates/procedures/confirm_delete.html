{% extends 'base.html' %}
{% block title %}Delete Procedure — HealthCare CRM{% endblock %}

{% block content %}
<div class="page-header">
  <h2>Delete Procedure</h2>
</div>
<div class="confirm-card">
  <p>Are you sure you want to delete procedure <strong>{{ procedure.name }}</strong>?</p>
  <p class="text-muted">This action cannot be undone.</p>
  <form method="post">
    {% csrf_token %}
    <div class="form-actions">
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'procedure_detail' procedure.pk %}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
