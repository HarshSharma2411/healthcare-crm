{% extends 'base.html' %}
{% block title %}Delete Doctor — HealthCare CRM{% endblock %}

{% block content %}
<div class="page-header">
  <h2>Delete Doctor</h2>
</div>
<div class="confirm-card">
  <p>Are you sure you want to delete <strong>{{ doctor.full_name }}</strong>?</p>
  <p class="text-muted">This action cannot be undone.</p>
  <form method="post">
    {% csrf_token %}
    <div class="form-actions">
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'doctor_detail' doctor.pk %}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
